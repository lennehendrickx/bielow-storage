<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.title }}</title>
  {% assign page_desc = page.description | default: site.description %}
  <meta name="description" content="{{ page_desc | strip }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} – {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{{ page_desc | strip }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:locale" content="nl_BE">
  {% assign og_img = page.og_image | default: site.og_image | default: '/assets/images/logo.png' %}
  <meta property="og:image" content="{{ og_img | absolute_url }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }} – {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{{ page_desc | strip }}">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" href="{{ '/assets/images/logo.png' | relative_url }}" type="image/png">
  <link rel="apple-touch-icon" href="{{ '/assets/images/logo.png' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body>
  <a href="#main" class="skip-link">Ga naar inhoud</a>
  {% include header.html %}
  <main id="main" class="main" role="main" tabindex="-1">
    {{ content }}
  </main>
  {% include footer.html %}
  <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-label="Afbeelding vergroten">
    <button type="button" class="lightbox-close" aria-label="Sluiten">&times;</button>
    <div class="lightbox-backdrop"></div>
    <div class="lightbox-content">
      <img src="" alt="" class="lightbox-img">
      <p class="lightbox-caption"></p>
    </div>
  </div>
  <script src="{{ site.baseurl }}/assets/js/main.js"></script>
</body>
</html>
